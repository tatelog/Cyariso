name: Deploy to GitHub Pages

# 静的サイト（リポジトリ直下）をそのまま GitHub Pages へデプロイする。
on:
  push:
    branches:
      - main
      - claude/chari-sou-research-ubfm7t
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに制限。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ビルド不要の静的サイトなのでリポジトリ全体をアップロード。
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
